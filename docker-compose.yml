version: '3.9'

services:
  # ─────────────────────────────────────────────
  # Next.js App
  # ─────────────────────────────────────────────
  app:
    container_name: boa_app
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_SANITY_PROJECT_ID=${NEXT_PUBLIC_SANITY_PROJECT_ID}
      - NEXT_PUBLIC_SANITY_DATASET=${NEXT_PUBLIC_SANITY_DATASET}
      - NEXT_PUBLIC_SANITY_API_VERSION=${NEXT_PUBLIC_SANITY_API_VERSION}
      - SANITY_API_TOKEN=${SANITY_API_TOKEN}
    depends_on:
      - sanity
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Sanity Studio (embedded dev server)
  # ─────────────────────────────────────────────
  sanity:
    container_name: boa_sanity
    build:
      context: ./sanity
      dockerfile: Dockerfile.dev
    ports:
      - '3333:3333'
    volumes:
      - ./sanity:/app
      - /app/node_modules
    environment:
      - SANITY_STUDIO_PROJECT_ID=${NEXT_PUBLIC_SANITY_PROJECT_ID}
      - SANITY_STUDIO_DATASET=${NEXT_PUBLIC_SANITY_DATASET}
    restart: unless-stopped

volumes:
  node_modules:
